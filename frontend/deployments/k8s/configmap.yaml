apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  labels:
    app: frontend
data:
  # Read by docker-entrypoint.sh and written into /config.js at container start.
  # API_BASE_URL = root URL of the api-gateway (with scheme).
  # Empty string => use same-origin (works when ingress routes /auth, /storage,
  # /ai to the gateway from the same host as the SPA).
  API_BASE_URL: ""
  SHARE_BASE_URL: ""
