server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reasonable security headers. CSP is intentionally permissive on
    # connect-src so the frontend can talk to the api-gateway from any
    # origin you configure at runtime.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https: http: blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Health endpoint for liveness/readiness probes.
    location = /healthz {
        access_log off;
        add_header Content-Type "text/plain" always;
        return 200 "ok\n";
    }

    # Hashed Vite assets are immutable.
    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Runtime config — generated by docker-entrypoint at container start.
    # Always served fresh (no cache) so env changes propagate without rebuild.
    location = /config.js {
        access_log off;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # SPA fallback — every unknown route returns index.html so TanStack
    # Router can resolve client-side.
    location / {
        try_files $uri $uri/ /index.html;
        # index.html itself must NOT be cached, otherwise users keep
        # loading the old shell after we deploy a new bundle.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # gzip — Vite already pre-compresses but the static_gzip module isn't
    # bundled in the alpine image; on-the-fly gzip is fine for small
    # text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_vary on;
}
