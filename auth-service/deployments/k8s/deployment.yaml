apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: auth-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: auth-config
            - secretRef:
                name: auth-secrets

          livenessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /.well-known/jwks.json
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5