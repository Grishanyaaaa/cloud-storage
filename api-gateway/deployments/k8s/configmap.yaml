apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  ENV: "LOCAL"
  SERVER_HOST: "0.0.0.0"
  SERVER_PORT: "8080"
  SERVER_READ_TIMEOUT: "10s"
  SERVER_WRITE_TIMEOUT: "15s"
  SERVER_IDLE_TIMEOUT: "60s"
  SERVER_SHUTDOWN_TIMEOUT: "30s"

  AUTH_SERVICE_URL: "http://auth-service"
  STORAGE_SERVICE_URL: "http://storage-service"
  AI_SERVICE_URL: "http://ai-service"

  JWT_JWKS_URL: "http://auth-service/.well-known/jwks.json"
  JWT_JWKS_REFRESH_INTERVAL: "1h"
  JWT_ISSUER: "auth-service"
  JWT_AUDIENCE: "cloud-storage"

  CORS_ALLOW_ORIGINS: "http://cloud-storage.local"
  CORS_ALLOW_METHODS: "GET,POST,PUT,PATCH,DELETE,OPTIONS"
  CORS_ALLOW_HEADERS: "Content-Type,Authorization"
  CORS_ALLOW_CREDENTIALS: "false"
  CORS_MAX_AGE: "86400"
