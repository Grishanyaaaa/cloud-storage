apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-storage-ingress
spec:
  ingressClassName: nginx
  rules:
    - host: api.cloud-storage.local
      http:
        paths:
          # Auth endpoints - proxy to api-gateway
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
          # Storage endpoints
          - path: /storage
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

          # API endpoints - proxy to api-gateway
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

          # JWKS endpoint
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

          # Health checks
          - path: /health
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 80

          - path: /ready
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 80
